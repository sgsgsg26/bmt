ner of any page, select , then click **New repository**.\n    \n    ![Screenshot of a GitHub dropdown menu showing options to create new items. The menu item \"New repository\" is outlined in dark orange.](https://docs.github.com/assets/cb-29762/images/help/repository/repo-create-global-nav-update.png)\n    \n2.  Enter `username.github.io` as the repository name. Replace `username` with your GitHub username. For example, if your username is `octocat`, the repository name should be `octocat.github.io`.\n    \n    ![Screenshot of GitHub Pages settings in a repository. The repository name field contains the text \"octocat.github.io\" and is outlined in dark orange.](https://docs.github.com/assets/cb-48480/images/help/pages/create-repository-name-pages.png)\n    \n3.  Choose a repository visibility. For more information, see [About repositories](https://docs.github.com/en/repositories/creating-and-managing-repositories/about-repositories#about-repository-visibility).\n    \n4.  Toggle **Add README** to **On**.\n    \n5.  Click **Create repository**.\n    \n6.  Under your repository name, click **Settings**. If you cannot see the \"Settings\" tab, select the dropdown menu, then click **Settings**.\n    \n    ![Screenshot of a repository header showing the tabs. The \"Settings\" tab is highlighted by a dark orange outline.](https://docs.github.com/assets/cb-28260/images/help/repository/repo-actions-settings.png)\n    \n7.  In the \"Code and automation\" section of the sidebar, click **Pages**.\n    \n8.  Under \"Build and deployment\", under \"Source\", select **Deploy from a branch**.\n    \n9.  Under \"Build and deployment\", under \"Branch\", use the branch dropdown menu and select a publishing source.\n    \n    ![Screenshot of Pages settings in a GitHub repository. A menu to select a branch for a publishing source, labeled \"None,\" is outlined in dark orange.](https://docs.github.com/assets/cb-47265/images/help/pages/publishing-source-drop-down.png)\n    \n10.  Optionally, open the `README.md` file of your repository. The `README.md` file is where you will write the content for your site. You can edit the file or keep the default content for now.\n     \n11.  Visit `username.github.io` to view your new website. Note that it can take up to 10 minutes for changes to your site to publish after you push the changes to GitHub.\n     \n\n## [Changing the title and description](#changing-the-title-and-description)\n\nBy default, the title of your site is `username.github.io`. You can change the title by editing the `_config.yml` file in your repository. You can also add a description for your site.\n\n1.  Click the **Code** tab of your repository.\n    \n2.  In the file list, click `_config.yml` to open the file.\n    \n3.  Click to edit the file.\n    \n4.  The `_config.yml` file already contains a line that specifies the theme for your site. Add a new line with `title:` followed by the title you want. Add a new line with `description:` followed by the description you want. For example:\n    \n    ```\n    theme: jekyll-theme-minimal\n    title: Octocat's homepage\n    description: Bookmark this to keep an eye on my project updates!\n    ```\n    \n5.  When you are finished editing the file, click **Commit changes**.\n    \n\n## [Next Steps](#next-steps)\n\nYou've successfully created, personalized, and published your first GitHub Pages website but there's so much more to explore! Here are some helpful resources for taking your next steps with GitHub Pages:\n\n*   [Adding content to your GitHub Pages site using Jekyll](https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/adding-content-to-your-github-pages-site-using-jekyll#about-content-in-jekyll-sites): This guide explains how to add additional pages to your site.\n*   [Configuring a custom domain for your GitHub Pages site](https://docs.github.com/en/pages/configuring-a-custom-domain-for-your-github-pages-site): You can host your site on GitHub's `github.io` domain or your own custom domain.\n\nCite as: [docs.github.com](https://docs.github.com/pages/quickstart)\n\n-----\n\n",{"url":261,"title":261,"page_content":463,"answer_content":464},"You can configure your GitHub Pages site to publish when changes are pushed to a specific branch, or you can write a GitHub Actions workflow to publish your site.\n\n## Who can use this feature?\n\nPeople with admin or maintainer permissions for a repository can configure a publishing source for a GitHub Pages site.\n\nGitHub Pages is available in public repositories with GitHub Free and GitHub Free for organizations, and in public and private repositories with GitHub Pro, GitHub Team, GitHub Enterprise Cloud, and GitHub Enterprise Server. For more information, see [GitHub's plans](https://docs.github.com/en/get-started/learning-about-github/githubs-plans).\n\n## [About publishing sources](#about-publishing-sources)\n\nYou can publish your site when changes are pushed to a specific branch, or you can write a GitHub Actions workflow to publish your site.\n\nIf you do not need any control over the build process for your site, we recommend that you publish your site when changes are pushed to a specific branch. You can specify which branch and folder to use as your publishing source. The source branch can be any branch in your repository, and the source folder can either be the root of the repository (`/`) on the source branch or a `/docs` folder on the source branch. Whenever changes are pushed to the source branch, the changes in the source folder will be published to your GitHub Pages site.\n\nIf you want to use a build process other than Jekyll or you do not want a dedicated branch to hold your compiled static files, we recommend that you write a GitHub Actions workflow to publish your site. GitHub provides workflow templates for common publishing scenarios to help you write your workflow.\n\nWarning\n\nGitHub Pages sites are publicly available on the internet, even if the repository for the site is private (if your plan or organization allows it). If you have sensitive data in your site's repository, you may want to remove the data before publishing. For more information, see [About repositories](https://docs.github.com/en/repositories/creating-and-managing-repositories/about-repositories#about-repository-visibility).\n\n## [Publishing from a branch](#publishing-from-a-branch)\n\n1.  Make sure the branch you want to use as your publishing source already exists in your repository.\n    \n2.  On GitHub, navigate to your site's repository.\n    \n3.  Under your repository name, click **Settings**. If you cannot see the \"Settings\" tab, select the dropdown menu, then click **Settings**.\n    \n    ![Screenshot of a repository header showing the tabs. The \"Settings\" tab is highlighted by a dark orange outline.](https://docs.github.com/assets/cb-28260/images/help/repository/repo-actions-settings.png)\n    \n4.  In the \"Code and automation\" section of the sidebar, click **Pages**.\n    \n5.  Under \"Build and deployment\", under \"Source\", select **Deploy from a branch**.\n    \n6.  Under \"Build and deployment\", use the branch dropdown menu and select a publishing source.\n    \n    ![Screenshot of Pages settings in a GitHub repository. A menu to select a branch for a publishing source, labeled \"None,\" is outlined in dark orange.](https://docs.github.com/assets/cb-47265/images/help/pages/publishing-source-drop-down.png)\n    \n7.  Optionally, use the folder dropdown menu to select a folder for your publishing source.\n    \n    ![Screenshot of Pages settings in a GitHub repository. A menu to select a folder for a publishing source, labeled \"/(root),\" is outlined in dark orange.](https://docs.github.com/assets/cb-24510/images/help/pages/publishing-source-folder-drop-down.png)\n    \n8.  Click **Save**.\n    \n\n### [Troubleshooting publishing from a branch](#troubleshooting-publishing-from-a-branch)\n\nNote\n\nIf your repository contains symbolic links, you will need to publish your site using a GitHub Actions workflow. For more information about GitHub Actions, see [GitHub Actions documentation](https://docs.github.com/en/actions).\n\nNote\n\n*   If you are publishing from a branch and your site has not published automatically, make sure someone with admin permissions and a verified email address has pushed to the publishing source.\n*   Commits pushed by a GitHub Actions workflow that uses the `GITHUB_TOKEN` do not trigger a GitHub Pages build.\n\nIf you choose the `docs` folder on any branch as your publishing source, then later remove the `/docs` folder from that branch in your repository, your site won't build and you'll get a page build error message for a missing `/docs` folder. For more information, see [Troubleshooting Jekyll build errors for GitHub Pages sites](https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/troubleshooting-jekyll-build-errors-for-github-pages-sites#missing-docs-folder).\n\nYour GitHub Pages site will always be deployed with a GitHub Actions workflow run, even if you've configured your GitHub Pages site to be built using a different CI tool. Most external CI workflows \"deploy\" to GitHub Pages by committing the build output to the `gh-pages` branch of the repository, and typically include a `.nojekyll` file. When this happens, the GitHub Actions workflow will detect the state that the branch does not need a build step, and will execute only the steps necessary to deploy the site to GitHub Pages servers.\n\nTo find potential errors with either the build or deployment, you can check the workflow run for your GitHub Pages site by reviewing your repository's workflow runs. For more information, see [Viewing workflow run history](https://docs.github.com/en/actions/monitoring-and-troubleshooting-workflows/viewing-workflow-run-history). For more information about how to re-run the workflow in case of an error, see [Re-running workflows and jobs](https://docs.github.com/en/actions/managing-workflow-runs/re-running-workflows-and-jobs).\n\n## [Publishing with a custom GitHub Actions workflow](#publishing-with-a-custom-github-actions-workflow)\n\nTo configure your site to publish with GitHub Actions:\n\n1.  On GitHub, navigate to your site's repository.\n    \n2.  Under your repository name, click **Settings**. If you cannot see the \"Settings\" tab, select the dropdown menu, then click **Settings**.\n    \n    ![Screenshot of a repository header showing the tabs. The \"Settings\" tab is highlighted by a dark orange outline.](https://docs.github.com/assets/cb-28260/images/help/repository/repo-actions-settings.png)\n    \n3.  In the \"Code and automation\" section of the sidebar, click **Pages**.\n    \n4.  Under \"Build and deployment\", under \"Source\", select **GitHub Actions**.\n    \n5.  GitHub will suggest several workflow templates. If you already have a workflow to publish your site, you can skip this step. Otherwise, choose one of the options to create a GitHub Actions workflow. For more information about creating your custom workflow, see [Creating a custom GitHub Actions workflow to publish your site](#creating-a-custom-github-actions-workflow-to-publish-your-site).\n    \n    GitHub Pages does not associate a specific workflow to the GitHub Pages settings. However, the GitHub Pages settings will link to the workflow run that most recently deployed your site.\n    \n\n### [Creating a custom GitHub Actions workflow to publish your site](#creating-a-custom-github-actions-workflow-to-publish-your-site)\n\nFor more information about GitHub Actions, see [GitHub Actions documentation](https://docs.github.com/en/actions).\n\nWhen you configure your site to publish with GitHub Actions, GitHub will suggest workflow templates for common publishing scenarios. The general flow of a workflow is to:\n\n1.  Trigger whenever there is a push to the default branch of the repository or whenever the workflow is run manually from the Actions tab.\n2.  Use the [`actions/checkout`](https://github.com/actions/checkout) action to check out the repository contents.\n3.  If required by your site, build any static site files.\n4.  Use the [`actions/upload-pages-artifact`](https://github.com/actions/upload-pages-artifact) action to upload the static files as an artifact.\n5.  If the workflow was triggered by a push to the default branch, use the [`actions/deploy-pages`](https://github.com/actions/deploy-pages) action to deploy the artifact. This step is skipped if the workflow was triggered by a pull request.\n\nThe workflow templates use a deployment environment called `github-pages`. If your repository does not already include an environment called `github-pages`, the environment will be created automatically. We recommend that you add a deployment protection rule so that only the default branch can deploy to this environment. For more information, see [Managing environments for deployment](https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment).\n\n### [Troubleshooting publishing with a custom GitHub Actions workflow](#troubleshooting-publishing-with-a-custom-github-actions-workflow)\n\nFor information about how to troubleshoot your GitHub Actions workflow, see [Monitor workflows](https://docs.github.com/en/actions/monitoring-and-troubleshooting-workflows/about-monitoring-and-troubleshooting).","## [https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site)\n\nYou can configure your GitHub Pages site to publish when changes are pushed to a specific branch, or you can write a GitHub Actions workflow to publish your site.\n\n## Who can use this feature?\n\nPeople with admin or maintainer permissions for a repository can configure a publishing source for a GitHub Pages site.\n\nGitHub Pages is available in public repositories with GitHub Free and GitHub Free for organizations, and in public and private repositories with GitHub Pro, GitHub Team, GitHub Enterprise Cloud, and GitHub Enterprise Server. For more information, see [GitHub's plans](https://docs.github.com/en/get-started/learning-about-github/githubs-plans).\n\n## [About publishing sources](#about-publishing-sources)\n\nYou can publish your site when changes are pushed to a specific branch, or you can write a GitHub Actions workflow to publish your site.\n\nIf you do not need any control over the build process for your site, we recommend that you publish your site when changes are pushed to a specific branch. You can specify which branch and folder to use as your publishing source. The source branch can be any branch in your repository, and the source folder can either be the root of the repository (`/`) on the source branch or a `/docs` folder on the source branch. Whenever changes are pushed to the source branch, the changes in the source folder will be published to your GitHub Pages site.\n\nIf you want to use a build process other than Jekyll or you do not want a dedicated branch to hold your compiled static files, we recommend that you write a GitHub Actions workflow to publish your site. GitHub provides workflow templates for common publishing scenarios to help you write your workflow.\n\nWarning\n\nGitHub Pages sites are publicly available on the internet, even if the repository for the site is private (if your plan or organization allows it). If you have sensitive data in your site's repository, you may want to remove the data before publishing. For more information, see [About repositories](https://docs.github.com/en/repositories/creating-and-managing-repositories/about-repositories#about-repository-visibility).\n\n## [Publishing from a branch](#publishing-from-a-branch)\n\n1.  Make sure the branch you want to use as your publishing source already exists in your repository.\n    \n2.  On GitHub, navigate to your site's repository.\n    \n3.  Under your repository name, click **Settings**. If you cannot see the \"Settings\" tab, select the dropdown menu, then click **Settings**.\n    \n    ![Screenshot of a repository header showing the tabs. The \"Settings\" tab is highlighted by a dark orange outline.](https://docs.github.com/assets/cb-28260/images/help/repository/repo-actions-settings.png)\n    \n4.  In the \"Code and automation\" section of the sidebar, click **Pages**.\n    \n5.  Under \"Build and deployment\", under \"Source\", select **Deploy from a branch**.\n    \n6.  Under \"Build and deployment\", use the branch dropdown menu and select a publishing source.\n    \n    ![Screenshot of Pages settings in a GitHub repository. A menu to select a branch for a publishing source, labeled \"None,\" is outlined in dark orange.](https://docs.github.com/assets/cb-47265/images/help/pages/publishing-source-drop-down.png)\n    \n7.  Optionally, use the folder dropdown menu to select a folder for your publishing source.\n    \n    ![Screenshot of Pages settings in a GitHub repository. A menu to select a folder for a publishing source, labeled \"/(root),\" is outlined in dark orange.](https://docs.github.com/assets/cb-24510/images/help/pages/publishing-source-folder-drop-down.png)\n    \n8.  Click **Save**.\n    \n\n### [Troubleshooting publishing from a branch](#troubleshooting-publishing-from-a-branch)\n\nNote\n\nIf your repository contains symbolic links, you will need to publish your site using a GitHub Actions workflow. For more information about GitHub Actions, see [GitHub Actions documentation](https://docs.github.com/en/actions).\n\nNote\n\n*   If you are publishing from a branch and your site has not published automatically, make sure someone with admin permissions and a verified email address has pushed to the publishing source.\n*   Commits pushed by a GitHub Actions workflow that uses the `GITHUB_TOKEN` do not trigger a GitHub Pages build.\n\nIf you choose the `docs` folder on any branch as your publishing source, then later remove the `/docs` folder from that branch in your repository, your site won't build and you'll get a page build error message for a missing `/docs` folder. For more information, see [Troubleshooting Jekyll build errors for GitHub Pages sites](https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/troubleshooting-jekyll-build-errors-for-github-pages-sites#missing-docs-folder).\n\nYour GitHub Pages site will always be deployed with a GitHub Actions workflow run, even if you've configured your GitHub Pages site to be built using a different CI tool. Most external CI workflows \"deploy\" to GitHub Pages by committing the build output to the `gh-pages` branch of the repository, and typically include a `.nojekyll` file. When this happens, the GitHub Actions workflow will detect the state that the branch does not need a build step, and will execute only the steps necessary to deploy the site to GitHub Pages servers.\n\nTo find potential errors with either the build or deployment, you can check the workflow run for your GitHub Pages site by reviewing your repository's workflow runs. For more information, see [Viewing workflow run history](https://docs.github.com/en/actions/monitoring-and-troubleshooting-workflows/viewing-workflow-run-history). For more information about how to re-run the workflow in case of an error, see [Re-running workflows and jobs](https://docs.github.com/en/actions/managing-workflow-runs/re-running-workflows-and-jobs).\n\n## [Publishing with a custom GitHub Actions workflow](#publishing-with-a-custom-github-actions-workflow)\n\nTo configure your site to publish with GitHub Actions:\n\n1.  On GitHub, navigate to your site's repository.\n    \n2.  Under your repository name, click **Settings**. If you cannot see the \"Settings\" tab, select the dropdown menu, then click **Settings**.\n    \n    ![Screenshot of a repository header showing the tabs. The \"Settings\" tab is highlighted by a dark orange outline.](https://docs.github.com/assets/cb-28260/images/help/repository/repo-actions-settings.png)\n    \n3.  In the \"Code and automation\" section of the sidebar, click **Pages**.\n    \n4.  Under \"Build and deployment\", under \"Source\", select **GitHub Actions**.\n    \n5.  GitHub will suggest several workflow templates. If you already have a workflow to publish your site, you can skip this step. Otherwise, choose one of the options to create a GitHub Actions workflow. For more information about creating your custom workflow, see [Creating a custom GitHub Actions workflow to publish your site](#creating-a-custom-github-actions-workflow-to-publish-your-site).\n    \n    GitHub Pages does not associate a specific workflow to the GitHub Pages settings. However, the GitHub Pages settings will link to the workflow run that most recently deployed your site.\n    \n\n### [Creating a custom GitHub Actions workflow to publish your site](#creating-a-custom-github-actions-workflow-to-publish-your-site)\n\nFor more information about GitHub Actions, see [GitHub Actions documentation](https://docs.github.com/en/actions).\n\nWhen you configure your site to publish with GitHub Actions, GitHub will suggest workflow templates for common publishing scenarios. The general flow of a workflow is to:\n\n1.  Trigger whenever there is a push to the default branch of the repository or whenever the workflow is run manually from the Actions tab.\n2.  Use the [`actions/checkout`](https://github.com/actions/checkout) action to check out the repository contents.\n3.  If required by your site, build any static site files.\n4.  Use the [`actions/upload-pages-artifact`](https://github.com/actions/upload-pages-artifact) action to upload the static files as an artifact.\n5.  If the workflow was triggered by a push to the default branch, use the [`actions/deploy-pages`](https://github.com/actions/deploy-pages) action to deploy the artifact. This step is skipped if the workflow was triggered by a pull request.\n\nThe workflow templates use a deployment environment called `github-pages`. If your repository does not already include an environment called `github-pages`, the environment will be created automatically. We recommend that you add a deployment protection rule so that only the default branch can deploy to this environment. For more information, see [Managing environments for deployment](https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment).\n\n### [Troubleshooting publishing with a custom GitHub Actions workflow](#troubleshooting-publishing-with-a-custom-github-actions-workflow)\n\nFor information about how to troubleshoot your GitHub Actions workflow, see [Monitor workflows](https://docs.github.com/en/actions/monitoring-and-troubleshooting-workflows/about-monitoring-and-troubleshooting).\n\nCite as: [docs.github.com](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site)\n\n-----\n\n",{"id":466,"role":35,"content":467,"action":17,"recommend_actions":17,"is_prompt":22,"render_template":17,"session_state":468,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":476,"reasoning_encrypted_content":477,"reasoning_content":17,"cogen_id":17,"ctime":17},"70983c35-944e-4744-894c-3acb4d333d94","가장 쉬운 방법은 **GitHub 저장소에 `index.html` 하나 올리고, GitHub Pages를 켜는 것**입니다.\n\n### 1) 새 저장소 만들기\nGitHub에서 **New repository**를 눌러 새 저장소를 만드세요.  \n지금처럼 웹페이지 하나를 공유하려면 **Public**으로 만드는 게 가장 간단합니다. `username.github.io`라는 이름으로 만들면 사용자 홈페이지 형태로 바로 연결할 수 있습니다. [Source](https://docs.github.com/pages/quickstart)\n\n### 2) `index.html` 업로드하기\n만든 저장소에 들어가서 **Add file → Create new file** 또는 **Upload files**를 누른 뒤, 제가 만든 코드를 파일명 **`index.html`**로 저장하세요.  \n간단한 정적 사이트는 배포 브랜치의 **루트(`/`)** 또는 **`/docs` 폴더**에 두면 됩니다. `index.html`은 보통 루트에 두는 게 제일 쉽습니다. [Source](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site)\n\n### 3) GitHub Pages 켜기\n저장소 상단의 **Settings → Pages**로 이동한 다음,  \n**Build and deployment → Source**에서 **Deploy from a branch**를 선택하세요.  \n그다음 **Branch**는 보통 `main`, 폴더는 **`/(root)`** 를 선택하고 **Save**를 누르면 됩니다. [Source](https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site)\n\n### 4) 배포 완료 후 링크 공유하기\n저장 후 몇 분 기다리면 GitHub Pages 주소가 생성됩니다.  \n`username.github.io` 이름으로 저장소를 만들었다면 사이트 주소는 보통 **`https://username.github.io`** 입니다. GitHub는 반영까지 **최대 10분 정도** 걸릴 수 있다고 안내합니다. [Source](https://docs.github.com/pages/quickstart)\n\n### 당신한테 가장 쉬운 추천 방식\n지금은 복잡하게 하지 말고 이렇게 하세요.\n\n1. GitHub 로그인  \n2. 새 Public 저장소 생성  \n3. 파일 이름 `index.html`로 코드 업로드  \n4. **Settings → Pages → Deploy from a branch → main / (root)** 설정  \n5. 생성된 링크 복사해서 공유\n\n원하시면 다음 답변에서 제가  \n**“깃허브 웹에서 클릭만으로 올리는 초간단 버전”**으로  \n스크린샷 없이 1분짜리 가이드처럼 더 짧게 정리해드릴게요.",{"_llm_usage":469,"_finish_reason":45},{"prompt_tokens":470,"completion_tokens":471,"total_tokens":472,"prompt_tokens_details":473,"reasoning_tokens":475},51786,936,52722,{"cached_tokens":474},47616,339,"rs_0ee76e09c18ee8d3016a0e6b0d14948199bc927fc0139694d6","gAAAAABqDmsZN17cMSa-vpLMUWQzTYx8ZdHE7fcXYeEBXVDCx2Ey7jI9IDKmVs_iBf1uQFz9To0-Y_SVWHiIyoxIWG07A46T_kbXLjY2uittTrYkgIlXZzdWcAosDXbHTkcXEe6VgpSlWymxBn7Z5Z2ttjbioEsuzQ3nVklKE_XGRlYq8IK4b0yjLh0sEB559B0aAfGxs7O0f556Gie_HJp4vTAwVutnAW7gBGbCTi7Mcd6qi-Nn__3qUD43lzYnedmUGney9TqGwmpNUShTbDmiC5jLOBOEHtj86ozH3dc3PkiN6NFcIEpy2_ib_A8DmrG7-VzuvcMAh2JK_jZNVgX7IE28ON8d98apGbDreGh_EgoZaBxjZaZ_717zu4qwjcDkILf51X6MF_IfVEl8GctuwFkED-S8zDHM2_r7l-mI6Tm5xHixuYEFLKUDS-gHjW3UncqXBeZUhDsAYpLhh6u2LQrvqY_VL2WYJuqkRWvMxi7FCcMrFhlnXrHT4ztNAbv3t-fg2lXskcHZDwD7xFDL2fM5a6fexOCyrwvuAOkCt0rUg4GJzXz7ghihTl6PQNkVG7WOty_LDGrd1AZTFxR_6Iz1Xg_f2FAKU1aGmmOVm0EcfXDPL =\"https://cdn.tailwindcss.com\">\u003C/script>\n  \u003Cscript src=\"https://cdn.jsdelivr.net/npm/chart.js\">\u003C/script>\n  \u003Cstyle>\n    :root {\n      color-scheme: dark;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      font-family: \"Pretendard Variable\", \"Pretendard\", \"Noto Sans KR\", \"Apple SD Gothic Neo\", \"Malgun Gothic\", sans-serif;\n      background:\n        radial-gradient(circle at 20% 0%, rgba(59,130,246,0.16), transparent 28%),\n        radial-gradient(circle at 80% 10%, rgba(16,185,129,0.12), transparent 24%),\n        radial-gradient(circle at 50% 100%, rgba(168,85,247,0.12), transparent 28%),\n        linear-gradient(180deg, #020617 0%, #0f172a 45%, #111827 100%);\n      min-height: 100vh;\n      color: #e5e7eb;\n    }\n\n    .glass {\n      background: rgba(15, 23, 42, 0.78);\n      backdrop-filter: blur(16px);\n      -webkit-backdrop-filter: blur(16px);\n      border: 1px solid rgba(148, 163, 184, 0.12);\n      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);\n    }\n\n    .dashboard-card {\n      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;\n      position: relative;\n      overflow: hidden;\n    }\n\n    .dashboard-card:hover {\n      transform: translateY(-6px);\n      border-color: rgba(255,255,255,0.14);\n    }\n\n    .dashboard-card::before {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 22%);\n      pointer-events: none;\n    }\n\n    .gemini-glow:hover {\n      box-shadow: 0 20px 44px rgba(59, 130, 246, 0.22);\n    }\n\n    .claude-glow:hover {\n      box-shadow: 0 20px 44px rgba(249, 115, 22, 0.22);\n    }\n\n    .chatgpt-glow:hover {\n      box-shadow: 0 20px 44px rgba(16, 185, 129, 0.22);\n    }\n\n    .title-glow {\n      text-shadow: 0 0 24px rgba(250, 204, 21, 0.16), 0 0 32px rgba(99, 102, 241, 0.16);\n    }\n\n    .metric-pill {\n      background: rgba(148, 163, 184, 0.08);\n      border: 1px solid rgba(148, 163, 184, 0.14);\n    }\n\n    .lotto-ball {\n      width: 3rem;\n      height: 3rem;\n      border-radius: 9999px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      font-weight: 800;\n      font-size: 1rem;\n      letter-spacing: -0.02em;\n      border: 1px solid rgba(255,255,255,0.12);\n      box-shadow:\n        inset 0 2px 6px rgba(255,255,255,0.22),\n        inset 0 -6px 10px rgba(0,0,0,0.22),\n        0 10px 18px rgba(0,0,0,0.28);\n    }\n\n    .ball-yellow {\n      background: linear-gradient(135deg, #fde047, #f59e0b);\n      color: #111827;\n    }\n\n    .ball-blue {\n      background: linear-gradient(135deg, #93c5fd, #2563eb);\n      color: #eff6ff;\n    }\n\n    .ball-red {\n      background: linear-gradient(135deg, #fda4af, #dc2626);\n      color: #fff1f2;\n    }\n\n    .ball-gray {\n      background: linear-gradient(135deg, #e2e8f0, #64748b);\n      color: #0f172a;\n    }\n\n    .ball-green {\n      background: linear-gradient(135deg, #86efac, #16a34a);\n      color: #052e16;\n    }\n\n    .chart-box {\n      position: relative;\n      height: 190px;\n      width: 100%;\n    }\n\n    .soft-divider {\n      border-top: 1px solid rgba(148, 163, 184, 0.12);\n    }\n\n    .hero-badge {\n      background: rgba(30, 41, 59, 0.72);\n      border: 1px solid rgba(148, 163, 184, 0.14);\n    }\n\n    .stat-box {\n      background: rgba(148, 163, 184, 0.06);\n      border: 1px solid rgba(148, 163, 184, 0.12);\n    }\n  \u003C/style>\n\u003C/head>\n\u003Cbody>\n  \u003Cdiv class=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-10\">\n    \u003Cheader class=\"glass rounded-3xl px-6 sm:px-8 py-8 text-center mb-8\">\n      \u003Cdiv class=\"inline-flex items-center gap-2 hero-badge text-slate-300 rounded-full px-4 py-2 text-xs sm:text-sm mb-5\">\n        \u003Cspan>AI Lottery Insight Dashboard\u003C/span>\n        \u003Cspan class=\"text-slate-500\">•\u003C/span>\n        \u003Cspan>교육용 시연 페이지\u003C/span>\n      \u003C/div>\n\n      \u003Ch1 class=\"title-glow text-2xl sm:text-4xl lg:text-5xl font-black tracking-tight leading-tight\">\n        ✨ 3대 AI가 추천하는 금주의 로또 당첨 번호 비법 ✨\n      \u003C/h1>\n    \u003C/header>\n\n    \u003Csection class=\"grid grid-cols-1 xl:grid-cols-3 gap-6\" id=\"dashboardGrid\">\u003C/section>\n\n    \u003Csection class=\"mt-8 glass rounded-3xl p-6 lg:p-7\">\n      \u003Cdiv class=\"flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4\">\n        \u003Cdiv>\n          \u003Ch2 class=\"text-lg sm:text-xl font-bold tracking-tight text-slate-100\">한눈에 보는 분석 스타일 비교\u003C/h2>\n          \u003Cp class=\"mt-2 text-sm text-slate-300 leading-relaxed\">\n            세 AI 모두 같은 주제를 다루지만, 데이터 빈도 분석, 구조적 균형 분석, 시뮬레이션형 조합 제안처럼 서로 다른 결을 보여줍니다.\n          \u003C/p>\n        \u003C/div>\n\n        \u003Cdiv class=\"grid grid-cols-1 sm:grid-cols-3 gap-3 w-full lg:w-auto\">\n          \u003Cdiv class=\"metric-pill rounded-2xl px-4 py-3 text-center\">\n            \u003Cdiv class=\"text-xs text-slate-400\">Gemini\u003C/div>\n            \u003Cdiv class=\"text-base font-bold text-sky-300\">패턴 분석형\u003C/div>\n          \u003C/div>\n          \u003Cdiv class=\"metric-pill rounded-2xl px-4 py-3 text-center\">\n            \u003Cdiv class=\"text-xs text-slate-400\">Claude\u003C/div>\n            \u003Cdiv class=\"text-base font-bold text-orange-300\">균형 전략형\u003C/div>\n          \u003C/div>\n          \u003Cdiv class=\"metric-pill rounded-2xl px-4 py-3 text-center\">\n            \u003Cdiv class=\"text-xs text-slate-400\">Chat GPT\u003C/div>\n            \u003Cdiv class=\"text-base font-bold text-emerald-300\">시뮬레이션형\u003C/div>\n          \u003C/div>\n        \u003C/div>\n      \u003C/div>\n    \u003C/section>\n\n    \u003Cfooter class=\"mt-8\">\n      \u003Cdiv class=\"glass rounded-3xl px-6 py-5 text-sm sm:text-base text-slate-300 text-center leading-relaxed\">\n        ※ 본 대시보드의 예측은 각 AI의 고유한 분석 방식에 따른 가상 추천일 뿐이며, 실제 당첨 결과는 보장하지 않습니다 😉\n        \u003Cspan class=\"text-slate-400\">(연수에서 직접 AI 비서를 만들어보세요!)\u003C/span>\n      \u003C/div>\n    \u003C/footer>\n  \u003C/div>\n\n  \u003Cscript>\n    const aiData = [\n      {\n        key: \"gemini\",\n        aiName: \"Gemini 패턴 분석 엔진\",\n        displayName: \"♊ Gemini 패턴 분석 엔진\",\n        cardTitle: \"이번 주 로또 확률 기반 가상 조합 리포트\",\n        summary: \"누적 고빈도 데이터와 단기 미출현 패턴을 교차 분석한 가상 예측 시뮬레이션\",\n        numbers: [4, 15, 23, 27, 34, 41],\n        report: [\n          \"최근 15주간의 번호별 출현 간격과 역대 누적 고빈도 데이터를 결합하여 가상 번호를 추출했습니다.\",\n          \"홀수와 짝수의 비율을 4:2로, 저고(1~22/23~45) 비율을 2:4로 설정하여 통계적 회귀 경향성을 반영했습니다.\",\n          \"특히 장기 미출현 사이클에 진입한 20번대와 꾸준한 출현율을 유지 중인 30번대 데이터에 가중치를 부여했습니다.\",\n          \"본 결과물은 데이터 패턴 분석 알고리즘을 시연하기 위한 교육용 가상 데이터이며, 실제 당첨을 보장하지 않습니다.\"\n        ],\n        accentText: \"text-sky-300\",\n        badgeClass: \"gemini-glow\"\n      },\n      {\n        key: \"claude\",\n        aiName: \"Claude\",\n        displayName: \"🤖 Claude의 전략 분석\",\n        cardTitle: \"제1175회 로또 가상 추천 번호\",\n        summary: \"출현 빈도·홀짝 균형·번호대 분산을 종합한 가상 분석 추천\",\n        numbers: [3, 12, 23, 34, 38, 44],\n        report: [\n          \"출현 빈도 상위권 번호(34, 44, 12)와 중간 빈도 번호(3, 23, 38)를 혼합하여 편향을 줄였습니다.\",\n          \"홀수 3개(3, 23, 23→38 제외 시 3, 23) / 짝수 3개(12, 34, 38, 44) — 홀짝 비율을 3:3으로 맞춰 역대 최다 출현 비율에 근접시켰습니다.\",\n          \"1~15 저번호대 2개, 16~30 중번호대 1개, 31~45 고번호대 3개로 번호대를 분산 배치했습니다.\",\n          \"이 추천은 과거 통계 패턴에 기반한 가상 분석이며, 로또는 매 회차 독립 추첨이므로 실제 당첨을 보장하지 않습니다.\"\n        ],\n        accentText: \"text-orange-300\",\n        badgeClass: \"claude-glow\"\n      },\n      {\n        key: \"chatgpt\",\n        aiName: \"Chat GPT의 전략\",\n        displayName: \"💬 Chat GPT의 전략\",\n        cardTitle: \"이번 주 로또 가상 분석 추천 조합\",\n        summary: \"출현 빈도·최근 간격·홀짝 균형·번호대 분포를 조합한 시뮬레이션 기반 추천입니다.\",\n        numbers: [4, 11, 18, 27, 33, 42],\n        report: [\n          \"저번호와 고번호 비율을 3:3으로 맞춰 흐름 균형을 반영했습니다.\",\n          \"최근 출현 간격이 길었던 번호와 중간 빈도 번호를 함께 섞었
